# ===========================================================================
#  SonarCloud — Invoice Process (GR05: Gestión inteligente de facturas)
# ---------------------------------------------------------------------------
#  AJUSTA estos dos valores con los de TU organización/proyecto en SonarCloud:
#    - sonar.organization : el "Organization Key" (ej. tu usuario de GitHub)
#    - sonar.projectKey   : normalmente <organization>_<repositorio>
#  Y crea el secret SONAR_TOKEN en el repo (Settings → Secrets → Actions).
# ===========================================================================
sonar.organization=marinjosue
sonar.projectKey=marinjosue_invoice-process
sonar.projectName=Invoice Process - GR05
sonar.host.url=https://sonarcloud.io

# --- Código fuente analizado (backend NestJS + frontend Angular) ---
sonar.sources=invoice-process-back-end/src,invoice-process-front-end/src

# --- Archivos de prueba (conviven con el código, se distinguen por patrón) ---
sonar.tests=invoice-process-back-end/src,invoice-process-front-end/src
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# --- Excluir lo que no debe analizarse ---
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.module.ts,ml-security/**,.github/**

# --- Cobertura (reportes lcov generados por Jest y Karma) ---
sonar.javascript.lcov.reportPaths=invoice-process-back-end/coverage/lcov.info,invoice-process-front-end/coverage/lcov.info

sonar.sourceEncoding=UTF-8
