# ===========================================================================
#  SonarCloud — Invoice Process (GR05: Gestión inteligente de facturas)
#  Organización: marinjosue   |   Project Key: marinjosue_invoice-process
#  Requiere el secret SONAR_TOKEN en GitHub (Settings → Secrets → Actions).
# ===========================================================================
sonar.organization=marinjosue
sonar.projectKey=marinjosue_invoice-process
sonar.projectName=Invoice Process - GR05
sonar.host.url=https://sonarcloud.io

# ───────────────────────────────────────────────────────────────────────────
#  1) CARPETAS QUE SE ANALIZAN  (solo lo tuyo de back y front)
#     - Backend: todo src (módulos NestJS propios)
#     - Frontend: solo src/app (deja fuera main.ts, polyfills, assets, etc.)
#     Si quieres acotar aún más, reemplaza por subcarpetas concretas, ej.:
#       invoice-process-front-end/src/app/components,
#       invoice-process-front-end/src/app/core, ...
# ───────────────────────────────────────────────────────────────────────────
sonar.sources=invoice-process-back-end/src,invoice-process-front-end/src/app

# ───────────────────────────────────────────────────────────────────────────
#  2) PRUEBAS  (los *.spec.ts viven junto al código; se marcan como test
#     para que NO se cuenten también como fuente → evita el doble conteo)
# ───────────────────────────────────────────────────────────────────────────
sonar.tests=invoice-process-back-end/src,invoice-process-front-end/src/app
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# ───────────────────────────────────────────────────────────────────────────
#  3) EXCLUSIONES  (nada de esto se analiza)
#     Descomenta la línea de 'layout' si consideras esa carpeta plantilla.
# ───────────────────────────────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.module.ts,**/environments/**,**/*.config.ts,ml-security/**,.github/**
# ,invoice-process-front-end/src/app/layout/**

# ───────────────────────────────────────────────────────────────────────────
#  4) DUPLICADOS  (estos archivos son repetitivos por diseño:
#     DTOs, schemas, módulos y specs → se excluyen SOLO de la métrica de
#     duplicación para evitar falsos positivos en el Quality Gate)
# ───────────────────────────────────────────────────────────────────────────
sonar.cpd.exclusions=**/*.dto.ts,**/*.schema.ts,**/*.module.ts,**/*.spec.ts

# ───────────────────────────────────────────────────────────────────────────
#  5) COBERTURA  (reportes lcov de Jest y Karma)
# ───────────────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=invoice-process-back-end/coverage/lcov.info,invoice-process-front-end/coverage/lcov.info

sonar.sourceEncoding=UTF-8
