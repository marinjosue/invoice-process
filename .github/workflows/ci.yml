name: 🔄 CI - Build, Test & Analyze

# Pipeline principal de Integración Continua (rúbrica DevOps/DevSecOps).
# Etapas: Instalar dependencias → Lint → Pruebas (con cobertura) → Build → Análisis SonarCloud.
# Si una etapa CRÍTICA (pruebas o build) falla, el workflow falla y bloquea el flujo.
on:
  push:
    branches: [main, test, dev]
  pull_request:
    branches: [main, test, dev]
  workflow_dispatch:

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  # ───────────────────────────── BACKEND (NestJS + Jest) ─────────────────────────────
  backend:
    name: 🖥️ Backend · NestJS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invoice-process-back-end
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: invoice-process-back-end/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔎 Lint (no bloqueante)
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Pruebas + cobertura  [CRÍTICO]
        run: npm test -- --coverage --ci --passWithNoTests

      - name: 🏗️ Build  [CRÍTICO]
        run: npm run build

      - name: 📊 Subir cobertura backend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: invoice-process-back-end/coverage/
          retention-days: 14

  # ───────────────────────────── FRONTEND (Angular + Karma) ─────────────────────────────
  frontend:
    name: 💻 Frontend · Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invoice-process-front-end
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: invoice-process-front-end/package-lock.json

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔎 Lint (no bloqueante)
        run: npx eslint . --max-warnings=0
        continue-on-error: true

      - name: 🧪 Pruebas headless + cobertura  [CRÍTICO]
        # google-chrome viene preinstalado en ubuntu-latest; ChromeHeadlessCI lo usa con --no-sandbox.
        run: npm test -- --no-watch --no-progress --browsers=ChromeHeadlessCI --code-coverage

      - name: 🏗️ Build  [CRÍTICO]
        run: npm run build

      - name: 📊 Subir cobertura frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: invoice-process-front-end/coverage/
          retention-days: 14

  # ───────────────────────────── DevSecOps: SonarCloud ─────────────────────────────
  sonarcloud:
    name: 🔐 DevSecOps · SonarCloud
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Solo corre si las etapas críticas pasaron y existe el token de Sonar.
    if: success()
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Sonar necesita el historial completo para el blame

      - name: ⬇️ Descargar cobertura backend
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: invoice-process-back-end/coverage

      - name: ⬇️ Descargar cobertura frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: invoice-process-front-end/coverage

      - name: 🔬 Análisis SonarCloud
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: ⚠️ Aviso si falta SONAR_TOKEN
        if: env.SONAR_TOKEN == ''
        run: |
          echo "::warning::SONAR_TOKEN no configurado — se omitió el análisis SonarCloud."
          echo "Configura el secret SONAR_TOKEN y sonar-project.properties para activarlo."

  # ───────────────────────────── Notificación Telegram ─────────────────────────────
  notify:
    name: 📱 Notificar resultado
    runs-on: ubuntu-latest
    needs: [backend, frontend, sonarcloud]
    if: always()
    steps:
      - name: 📱 Enviar estado del CI a Telegram
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          BACK="${{ needs.backend.result }}"
          FRONT="${{ needs.frontend.result }}"
          SONAR="${{ needs.sonarcloud.result }}"
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚠️";; esac; }

          MESSAGE="🔄 <b>CI — ${{ github.repository }}</b>%0A%0A"
          MESSAGE+="🌿 <b>Ref:</b> ${{ github.ref_name }}%0A"
          MESSAGE+="📝 <b>Commit:</b> ${GITHUB_SHA:0:7}%0A%0A"
          MESSAGE+="$(icon "$BACK") Backend (test+build): ${BACK}%0A"
          MESSAGE+="$(icon "$FRONT") Frontend (test+build): ${FRONT}%0A"
          MESSAGE+="$(icon "$SONAR") SonarCloud: ${SONAR}%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver ejecución</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true
