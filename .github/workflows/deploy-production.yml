name: 🚀 Deploy to Production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  GCP_PROJECT: project-01900fb5-a41d-424c-940
  REGION: us-central1
  BACKEND_SERVICE: invoice-process-backend
  FRONTEND_SERVICE: invoice-process-frontend

jobs:
  validar-rama:
    name: ✅ Validar Rama de Producción
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Confirmar rama main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ Este workflow de producción debe ejecutarse desde la rama main."
            echo "Rama actual: ${{ github.ref_name }}"
            echo "Selecciona la rama main al usar Run workflow o dispara el deploy desde test-pipeline."
            exit 1
          fi

  detectar-cambios:
    name: 🔍 Detectar Cambios
    runs-on: ubuntu-latest
    needs: [validar-rama]
    outputs:
      backend: ${{ steps.cambios.outputs.backend }}
      frontend: ${{ steps.cambios.outputs.frontend }}
    steps:
      - name: 📥 Obtener código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Analizar archivos modificados
        id: cambios
        run: |
          MODIFICADOS=$(git diff --name-only HEAD^1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || echo "")

          echo "📋 Archivos modificados en este commit:"
          echo "$MODIFICADOS"

          if echo "$MODIFICADOS" | grep -q "^invoice-process-back-end/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "✅ Backend modificado — se desplegará"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
            echo "⏭️ Backend sin cambios — se omitirá"
          fi

          if echo "$MODIFICADOS" | grep -q "^invoice-process-front-end/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend modificado — se desplegará"
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
            echo "⏭️ Frontend sin cambios — se omitirá"
          fi

  notificar-inicio:
    name: 📱 Notificar Inicio de Despliegue
    runs-on: ubuntu-latest
    needs: [validar-rama, detectar-cambios]
    if: needs.detectar-cambios.outputs.backend == 'true' || needs.detectar-cambios.outputs.frontend == 'true'
    steps:
      - name: 📱 Enviar notificación de inicio
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          BACK="${{ needs.detectar-cambios.outputs.backend }}"
          FRONT="${{ needs.detectar-cambios.outputs.frontend }}"

          SERVICIOS=""
          [ "$BACK" = "true" ]  && SERVICIOS+="  • 🖥️ Backend → Cloud Run%0A"
          [ "$FRONT" = "true" ] && SERVICIOS+="  • 💻 Frontend → Cloud Run%0A"

          MESSAGE="🚀 <b>INICIANDO DESPLIEGUE A PRODUCCIÓN</b>%0A%0A"
          MESSAGE+="📦 <b>Repositorio:</b> ${{ github.repository }}%0A"
          MESSAGE+="🌿 <b>Rama:</b> ${{ github.ref_name }}%0A"
          MESSAGE+="📝 <b>Commit:</b> ${COMMIT_SHORT}%0A%0A"
          MESSAGE+="📋 <b>Servicios a desplegar:</b>%0A"
          MESSAGE+="${SERVICIOS}%0A"
          MESSAGE+="⏳ <b>Construyendo imágenes y desplegando...</b>%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver Progreso</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true

  desplegar-backend:
    name: 🖥️ Desplegar Backend en Cloud Run
    runs-on: ubuntu-latest
    needs: [validar-rama, detectar-cambios, notificar-inicio]
    if: needs.detectar-cambios.outputs.backend == 'true'
    steps:
      - name: 📥 Obtener código
        uses: actions/checkout@v4

      - name: 🔐 Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/189364885425/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@project-01900fb5-a41d-424c-940.iam.gserviceaccount.com

      - name: ☁️ Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configurar Docker para GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: 🏗️ Construir imagen del backend
        run: |
          docker build \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:latest \
            ./invoice-process-back-end

      - name: 📤 Subir imagen del backend
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:latest

      - name: 🚀 Desplegar backend en Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --quiet

      - name: ✅ Notificar backend desplegado
        if: success()
        run: |
          MESSAGE="✅ <b>BACKEND DESPLEGADO</b>%0A%0A"
          MESSAGE+="🖥️ <b>Servicio:</b> ${{ env.BACKEND_SERVICE }}%0A"
          MESSAGE+="☁️ <b>Plataforma:</b> Google Cloud Run%0A"
          MESSAGE+="📝 <b>Commit:</b> ${GITHUB_SHA:0:7}%0A"
          MESSAGE+="🌐 <b>URL:</b> https://api.devsje.dev"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true

      - name: ❌ Notificar error en backend
        if: failure()
        run: |
          MESSAGE="❌ <b>ERROR AL DESPLEGAR BACKEND</b>%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver Logs</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true

  desplegar-frontend:
    name: 💻 Desplegar Frontend en Cloud Run
    runs-on: ubuntu-latest
    needs: [validar-rama, detectar-cambios, notificar-inicio]
    if: needs.detectar-cambios.outputs.frontend == 'true'
    steps:
      - name: 📥 Obtener código
        uses: actions/checkout@v4

      - name: 🔐 Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/189364885425/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@project-01900fb5-a41d-424c-940.iam.gserviceaccount.com

      - name: ☁️ Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configurar Docker para GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: 🏗️ Construir imagen del frontend
        run: |
          docker build \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:latest \
            ./invoice-process-front-end

      - name: 📤 Subir imagen del frontend
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:latest

      - name: 🚀 Desplegar frontend en Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: ✅ Notificar frontend desplegado
        if: success()
        run: |
          MESSAGE="✅ <b>FRONTEND DESPLEGADO</b>%0A%0A"
          MESSAGE+="💻 <b>Servicio:</b> ${{ env.FRONTEND_SERVICE }}%0A"
          MESSAGE+="☁️ <b>Plataforma:</b> Google Cloud Run%0A"
          MESSAGE+="📝 <b>Commit:</b> ${GITHUB_SHA:0:7}%0A"
          MESSAGE+="🌐 <b>URL:</b> https://liquidaciones.devsje.dev"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true

      - name: ❌ Notificar error en frontend
        if: failure()
        run: |
          MESSAGE="❌ <b>ERROR AL DESPLEGAR FRONTEND</b>%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver Logs Detallados</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true

  notificar-despliegue-completo:
    name: 🎉 Notificar Despliegue Completo
    runs-on: ubuntu-latest
    needs: [validar-rama, detectar-cambios, desplegar-backend, desplegar-frontend]
    if: always() && (needs.desplegar-backend.result == 'success' || needs.desplegar-frontend.result == 'success')
    steps:
      - name: 🎉 Enviar notificación de éxito
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          BACK="${{ needs.desplegar-backend.result }}"
          FRONT="${{ needs.desplegar-frontend.result }}"

          icon() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac; }

          MESSAGE="🎉 <b>DESPLIEGUE COMPLETO</b>%0A%0A"
          MESSAGE+="📦 <b>Repositorio:</b> ${{ github.repository }}%0A"
          MESSAGE+="📝 <b>Commit:</b> ${COMMIT_SHORT}%0A%0A"
          MESSAGE+="📊 <b>Resultado por servicio:</b>%0A"
          MESSAGE+="  $(icon $BACK) Backend: ${BACK}%0A"
          MESSAGE+="  $(icon $FRONT) Frontend: ${FRONT}%0A%0A"
          MESSAGE+="🌐 <b>URLs en producción:</b>%0A"
          MESSAGE+="  • <a href='https://liquidaciones.devsje.dev'>liquidaciones.devsje.dev</a>%0A"
          MESSAGE+="  • <a href='https://api.devsje.dev/api-docs'>api.devsje.dev</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true

  notificar-sin-cambios:
    name: ℹ️ Sin Cambios para Desplegar
    runs-on: ubuntu-latest
    needs: [detectar-cambios]
    if: needs.detectar-cambios.outputs.backend == 'false' && needs.detectar-cambios.outputs.frontend == 'false'
    steps:
      - name: ℹ️ Notificar que no hay cambios
        run: |
          MESSAGE="ℹ️ <b>DESPLIEGUE OMITIDO</b>%0A%0A"
          MESSAGE+="📝 <b>Commit:</b> ${GITHUB_SHA:0:7}%0A%0A"
          MESSAGE+="ℹ️ Los cambios no afectaron ni el backend ni el frontend.%0A"
          MESSAGE+="No se reconstruyó ninguna imagen."

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true
