name: 🚀 Deploy to Production

# IMPORTANTE: el deploy a producción NO se dispara con 'push: [main]'.
# Solo se ejecuta vía 'workflow_dispatch', disparado automáticamente por
# test-pipeline.yml DESPUÉS de pasar los tests y el merge test→main.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  GCP_PROJECT: project-01900fb5-a41d-424c-940
  REGION: us-central1
  BACKEND_SERVICE: invoice-process-backend
  FRONTEND_SERVICE: invoice-process-frontend

jobs:
  notify-deploy-start:
    name: 📱 Notify Deployment Start
    runs-on: ubuntu-latest

    steps:
      - name: 📱 Notificar inicio de despliegue
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"

          MESSAGE="🚀 <b>INICIANDO DESPLIEGUE A PRODUCCIÓN</b>%0A%0A"
          MESSAGE+="📦 <b>Repositorio:</b> ${{ github.repository }}%0A"
          MESSAGE+="🌿 <b>Rama:</b> main%0A"
          MESSAGE+="📝 <b>Commit:</b> ${COMMIT_SHORT}%0A%0A"
          MESSAGE+="📋 <b>Servicios a desplegar:</b>%0A"
          MESSAGE+="  • 🖥️ Backend → Cloud Run%0A"
          MESSAGE+="  • 💻 Frontend → Cloud Run%0A%0A"
          MESSAGE+="⏳ <b>Construyendo imágenes y desplegando...</b>%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver Progreso</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"

  deploy-backend:
    name: 🖥️ Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: [notify-deploy-start]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/189364885425/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@project-01900fb5-a41d-424c-940.iam.gserviceaccount.com

      - name: ☁️ Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: 🏗️ Build backend image
        run: |
          docker build \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:latest \
            ./invoice-process-back-end

      - name: 📤 Push backend image
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:latest

      - name: 🚀 Deploy backend to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image gcr.io/${{ env.GCP_PROJECT }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --quiet

      - name: 📱 Notificar backend desplegado
        if: success()
        run: |
          MESSAGE="✅ <b>BACKEND DESPLEGADO</b>%0A%0A"
          MESSAGE+="🖥️ <b>Servicio:</b> ${{ env.BACKEND_SERVICE }}%0A"
          MESSAGE+="☁️ <b>Plataforma:</b> Google Cloud Run%0A"
          MESSAGE+="📝 <b>Commit:</b> ${GITHUB_SHA:0:7}%0A"
          MESSAGE+="🌐 <b>URL:</b> https://api.devsje.dev%0A%0A"
          MESSAGE+="✅ <b>Estado:</b> En producción"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"

      - name: 📱 Notificar error en backend
        if: failure()
        run: |
          MESSAGE="❌ <b>ERROR EN DEPLOY BACKEND</b>%0A%0A"
          MESSAGE+="🖥️ <b>Servicio:</b> ${{ env.BACKEND_SERVICE }}%0A"
          MESSAGE+="☁️ <b>Plataforma:</b> Google Cloud Run%0A"
          MESSAGE+="❌ <b>Estado:</b> Deploy fallido%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver Logs</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"

  deploy-frontend:
    name: 💻 Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs: [notify-deploy-start]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/189364885425/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@project-01900fb5-a41d-424c-940.iam.gserviceaccount.com

      - name: ☁️ Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: 🏗️ Build frontend image
        run: |
          docker build \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            -t gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:latest \
            ./invoice-process-front-end

      - name: 📤 Push frontend image
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:latest

      - name: 🚀 Deploy frontend to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image gcr.io/${{ env.GCP_PROJECT }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: 📱 Notificar frontend desplegado
        if: success()
        run: |
          MESSAGE="✅ <b>FRONTEND DESPLEGADO</b>%0A%0A"
          MESSAGE+="💻 <b>Servicio:</b> ${{ env.FRONTEND_SERVICE }}%0A"
          MESSAGE+="☁️ <b>Plataforma:</b> Google Cloud Run%0A"
          MESSAGE+="📝 <b>Commit:</b> ${GITHUB_SHA:0:7}%0A"
          MESSAGE+="🌐 <b>URL:</b> https://liquidaciones.devsje.dev%0A%0A"
          MESSAGE+="✅ <b>Estado:</b> En producción"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"

      - name: 📱 Notificar error en frontend
        if: failure()
        run: |
          MESSAGE="❌ <b>ERROR EN DEPLOY FRONTEND</b>%0A%0A"
          MESSAGE+="💻 <b>Servicio:</b> ${{ env.FRONTEND_SERVICE }}%0A"
          MESSAGE+="☁️ <b>Plataforma:</b> Google Cloud Run%0A"
          MESSAGE+="❌ <b>Estado:</b> Deploy fallido%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver Logs</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"

  notify-deploy-complete:
    name: 📱 Notify Deployment Complete
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: success()

    steps:
      - name: 📱 Notificar despliegue completo
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"

          MESSAGE="🎉 <b>DESPLIEGUE COMPLETO</b>%0A%0A"
          MESSAGE+="📦 <b>Repositorio:</b> ${{ github.repository }}%0A"
          MESSAGE+="📝 <b>Commit:</b> ${COMMIT_SHORT}%0A%0A"
          MESSAGE+="✅ <b>Servicios desplegados:</b>%0A"
          MESSAGE+="  • 🖥️ Backend → Cloud Run ✅%0A"
          MESSAGE+="  • 💻 Frontend → Cloud Run ✅%0A%0A"
          MESSAGE+="🚀 <b>Pipeline CI/CD Completo:</b>%0A"
          MESSAGE+="  1️⃣ Análisis ML de Seguridad ✅%0A"
          MESSAGE+="  2️⃣ Tests Automáticos ✅%0A"
          MESSAGE+="  3️⃣ Merge Automático ✅%0A"
          MESSAGE+="  4️⃣ Despliegue a Producción ✅%0A%0A"
          MESSAGE+="🌐 <b>URLs en producción:</b>%0A"
          MESSAGE+="  • <a href='https://liquidaciones.devsje.dev'>liquidaciones.devsje.dev</a>%0A"
          MESSAGE+="  • <a href='https://api.devsje.dev/api-docs'>api.devsje.dev</a>%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'>Ver Commit</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"

  notify-deploy-failure:
    name: 📱 Notify Deployment Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: failure()

    steps:
      - name: 📱 Notificar fallo en despliegue
        run: |
          MESSAGE="❌ <b>ERROR EN DESPLIEGUE</b>%0A%0A"
          MESSAGE+="📦 <b>Repositorio:</b> ${{ github.repository }}%0A"
          MESSAGE+="🌿 <b>Rama:</b> main%0A"
          MESSAGE+="❌ <b>Estado:</b> Despliegue fallido%0A%0A"
          MESSAGE+="⚠️ <b>Uno o más servicios no se desplegaron%0A%0A"
          MESSAGE+="🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Ver Logs Detallados</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"
